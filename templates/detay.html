<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ cicek.baslik }} | Nora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="detay-container">
    <img src="{{ cicek.img }}" alt="{{ cicek.baslik }}" class="detay-img">
    <div class="detay-info">
        <h1>{{ cicek.baslik }}</h1>
        <div class="prices" style="justify-content:center;">
            {% if cicek.eski_fiyat|int > 0 %}
            <span class="old-price">{{ cicek.eski_fiyat }} TL</span>
            {% endif %}
            <span class="price" style="font-size:28px;">{{ cicek.fiyat }} TL</span>
        </div>
        <div style="margin:8px 0; font-weight:bold; color: {% if cicek.stok > 0 %}green{% else %}red{% endif %};">
            Stok: {{ cicek.stok }} adet
            {% if cicek.stok == 1 %}
            <span style="color:orange;">⭐ Son ürün!</span>
            {% endif %}
        </div>
        <div class="detay-desc">{{ cicek.detay }}</div>
        {% if cicek.stok > 0 %}
        <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin-top:16px;">
            <button onclick="adetAzalt()" style="padding:8px 16px; border-radius:8px; border:1px solid #ddd; background:white; font-size:20px; cursor:pointer;">−</button>
            <span id="adetMiktar" style="font-size:20px; font-weight:bold; min-width:40px;">1</span>
            <button onclick="adetArtir()" style="padding:8px 16px; border-radius:8px; border:1px solid #ddd; background:white; font-size:20px; cursor:pointer;">+</button>
        </div>
        <button class="btn-sepete-ekle" onclick="sepeteAtVeDon('{{ cicek.baslik }}', {{ cicek.fiyat }})">
            🛒 Sepete Ekle
        </button>
        {% else %}
        <button class="btn-sepete-ekle" disabled style="background:#ccc;">TÜKENDİ</button>
        {% endif %}
        <a href="/" class="detay-geri">← Mağazaya Dön</a>
    </div>
</div>

<script>
/* eslint-disable */
    let adet = 1;
    const maxStok = parseInt('{{ cicek.stok }}', 10);

    function adetArtir() {
        if (adet < maxStok) {
            adet++;
            document.getElementById('adetMiktar').innerText = adet;
        } else {
            alert('Stokta bu kadar ürün yok.');
        }
    }
    function adetAzalt() {
        if (adet > 1) {
            adet--;
            document.getElementById('adetMiktar').innerText = adet;
        }
    }

    function sepeteAtVeDon(ad, fiyat) {
        let temp = JSON.parse(localStorage.getItem('nora_temp_sepet') || '[]');
        for (let i = 0; i < adet; i++) {
            temp.push({ad, fiyat});
        }
        localStorage.setItem('nora_temp_sepet', JSON.stringify(temp));

        let toast = document.createElement('div');
        toast.textContent = '✅ ' + ad + ' (x' + adet + ') sepete eklendi! Yönlendiriliyor...';
        toast.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 24px;border-radius:30px;z-index:3000;font-size:14px;';
        document.body.appendChild(toast);
        setTimeout(() => {
            window.location.href = '/?eklendi=1';
        }, 800);
    }
/* eslint-enable */
</script>
</body>
</html>
