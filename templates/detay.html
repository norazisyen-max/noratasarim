<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ cicek.baslik }} | Nora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="detay-container">
        <img src="{{ cicek.img }}" alt="{{ cicek.baslik }}" class="detay-img">
        <div class="detay-info">
            <h1 style="margin-bottom:4px; color:var(--text);">{{ cicek.baslik }}</h1>
            <div class="prices" style="justify-content:center;">
                {% if cicek.eski_fiyat > 0 %}
                <span class="old-price">{{ cicek.eski_fiyat }} TL</span>
                {% endif %}
                <span class="price" style="font-size:28px;">{{ cicek.fiyat }} TL</span>
            </div>
            <div class="detay-desc">{{ cicek.detay }}</div>
            <button class="btn-sepete-ekle" onclick="sepeteAtVeDon('{{ cicek.baslik }}', {{ cicek.fiyat }})">
                🛒 Sepete Ekle
            </button>
            <a href="/" class="detay-geri">← Mağazaya Dön</a>
        </div>
    </div>

    <script>
        function sepeteAtVeDon(ad, fiyat) {
            let mevcut = JSON.parse(localStorage.getItem('nora_temp_sepet') || '[]');
            mevcut.push({ad, fiyat});
            localStorage.setItem('nora_temp_sepet', JSON.stringify(mevcut));
            // Toast göster
            let toast = document.createElement('div');
            toast.textContent = '✅ ' + ad + ' sepete eklendi! Yönlendiriliyor...';
            toast.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 24px;border-radius:30px;z-index:3000;font-size:14px;';
            document.body.appendChild(toast);
            setTimeout(() => {
                window.location.href = '/?eklendi=1';
            }, 800);
        }

        // Sayfa yüklenince localStorage'daki ürünleri ana sayfaya taşımak için
        // Ana sayfa zaten bu kontrolü yapıyor, ama burada da yapabiliriz.
    </script>
</body>
</html>
